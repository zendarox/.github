<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="22%" r="48%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="12%" cy="88%" r="42%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow1)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="rgba(148,163,184,0.08)" stroke-width="1">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="180" x2="1280" y2="180"/>
    <line x1="0" y1="270" x2="1280" y2="270"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
  </g>

  <!-- Decorative rings -->
  <circle cx="1040" cy="120" r="95" fill="none" stroke="rgba(34,211,238,0.18)" stroke-width="1.5"/>
  <circle cx="1040" cy="120" r="62" fill="none" stroke="rgba(139,92,246,0.22)" stroke-width="1"/>
  <circle cx="220" cy="280" r="70" fill="none" stroke="rgba(34,211,238,0.12)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="72" y="88" width="56" height="56" rx="12" fill="rgba(15,23,42,0.9)" stroke="url(#accent)" stroke-width="1.5"/>
  <text x="100" y="124" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="800" fill="#22d3ee">ZX</text>

  <!-- Brand -->
  <text x="148" y="112" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="0.14em">ZENDAROX</text>
  <text x="148" y="152" font-family="Inter,system-ui,sans-serif" font-size="40" font-weight="800" fill="#f8fafc">Production DeFi Engineering</text>
  <text x="148" y="192" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#94a3b8">Smart contracts · Security audits · Client delivery · Own protocol</text>

  <!-- Accent bar -->
  <rect x="148" y="214" width="220" height="4" rx="2" fill="url(#accent)"/>

  <!-- Stats pills -->
  <rect x="148" y="244" width="130" height="36" rx="18" fill="rgba(15,23,42,0.75)" stroke="rgba(34,211,238,0.25)"/>
  <text x="213" y="267" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#e2e8f0">San Francisco, CA</text>

  <rect x="292" y="244" width="118" height="36" rx="18" fill="rgba(15,23,42,0.75)" stroke="rgba(139,92,246,0.25)"/>
  <text x="351" y="267" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#e2e8f0">Est. April 2025</text>

  <rect x="424" y="244" width="148" height="36" rx="18" fill="rgba(15,23,42,0.75)" stroke="rgba(34,211,238,0.25)"/>
  <text x="498" y="267" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#e2e8f0">14 Client Engagements</text>

  <!-- Protocol card -->
  <rect x="900" y="200" width="308" height="108" rx="14" fill="rgba(15,23,42,0.82)" stroke="rgba(56,189,248,0.28)" stroke-width="1"/>
  <text x="924" y="232" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#64748b" letter-spacing="0.1em">FLAGSHIP</text>
  <text x="924" y="258" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#f8fafc">Zendarox Vault</text>
  <text x="924" y="282" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94a3b8">Isolated lending · Yield router</text>
  <circle cx="1176" cy="254" r="28" fill="none" stroke="rgba(34,211,238,0.35)" stroke-width="2"/>
  <circle cx="1176" cy="254" r="8" fill="#22d3ee" opacity="0.7"/>
</svg>
